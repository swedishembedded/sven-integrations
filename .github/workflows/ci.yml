name: CI
run-name: "CI – ${{ github.ref_name }} (${{ github.event_name }})"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install
        run: pip install ".[dev]"

      - name: Run tests
        run: pytest src/ tests/ -v --tb=short --ignore=src/sven_integrations/shotcut

      - name: Run shotcut tests (requires lxml)
        run: |
          pip install lxml
          pytest src/sven_integrations/shotcut/tests/ -v --tb=short || true

  validate-skills:
    name: Validate SKILL.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate skill frontmatter
        run: python tests/test_skills.py

  integration:
    name: Integration smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: pip install ".[all]"

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run integration tests
        run: bats tests/test_integration.bats
